# Dependabot — keep the pinned GitHub Actions (CodeQL, TruffleHog) up
# to date. No npm / pip ecosystems here: the site is vanilla HTML/CSS/JS
# and Wrangler is invoked via `npx`, not installed as a dependency.

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - ci
      - dependencies
    commit-message:
      prefix: ci
      include: scope
